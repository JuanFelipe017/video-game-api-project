<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>GameHub — Explorar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/toast.css">
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H9v2H7v-2H5v-2h2V9h2v2h2v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 10 18.5 10s1.5.67 1.5 1.5S19.33 12 18.5 12z" />
                    </svg>
                </div>
                GameHub
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Buscar juegos, géneros, plataformas...">
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="favorites.html" id="nav-favorites">Favoritos</a>
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1>Explorar juegos</h1>
        </div>

        <!-- Grid de juegos — games.js lo llena dinámicamente -->
        <section class="section">
            <div class="games-grid" id="games-container">
                <!-- Las cards se insertan desde games.js -->
                <div class="loading-placeholder">Cargando juegos...</div>
            </div>

            <!-- Botón para paginación -->
            <div style="text-align:center; margin-top:40px;">
                <button id="load-more-btn" class="btn btn-green" style="padding:12px 32px; font-size:15px;">
                    Cargar más
                </button>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/games.js"></script>
</body>

</html>
