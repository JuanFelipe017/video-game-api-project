<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/toast.css">
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H9v2H7v-2H5v-2h2V9h2v2h2v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 10 18.5 10s1.5.67 1.5 1.5S19.33 12 18.5 12z" />
                    </svg>
                </div>
                GameHub
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar juegos...">
            </div>
            <nav>
                <a href="games.html">Explorar</a>
                <a href="favorites.html" id="nav-favorites">Favoritos</a>
                <a href="login.html" id="nav-login">Login</a>
            </nav>
        </div>
    </header>

    <main>
        <!-- HERO -->
        <section class="hero">
            <div class="hero-content">
                <h1>Descubre nuevos videojuegos</h1>
                <p>Explora miles de juegos, guarda tus favoritos y encuentra tu próxima aventura.</p>
                <a href="games.html" class="btn btn-green">Explorar juegos</a>
            </div>
        </section>
        <!-- POPULAR GAMES -->
        <section class="section">
            <h2>Popular games</h2>
            <!-- main.js llena este grid dinámicamente -->
            <div class="games-grid" id="popular-games-container">
                <p class="loading-text">Cargando juegos populares...</p>
            </div>
        </section>

        <!-- NEW RELEASES -->
        <section class="section">
            <h2>New releases</h2>
            <!-- main.js llena este grid dinámicamente -->
            <div class="games-grid" id="new-releases-container">
                <p class="loading-text">Cargando lanzamientos...</p>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
